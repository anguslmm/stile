# Full example: GitHub + Filesystem + Fetch (stdio) + mock SSE server (HTTP).
# Uses Dockerfile.example which includes Node.js, Python, and the mock SSE server.
# Postgres for caller store + audit log. Redis for centralized health checks.
#
# Usage:
#   export GITHUB_PERSONAL_ACCESS_TOKEN="$(gh auth token)"
#   export ADMIN_API_KEY="pick-a-secret"
#   docker compose -f docker-compose.example.yml up --build
#
# Jaeger UI: http://localhost:16686
# Health agent liveness: http://localhost:8081/healthz
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: stile
      POSTGRES_USER: stile
      POSTGRES_PASSWORD: stile
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stile"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  # Mock SSE MCP server (HTTP upstream) — runs as its own service so both
  # the gateway and health agent can reach it via Docker networking.
  mock-sse:
    build:
      context: .
      dockerfile: Dockerfile.example
    entrypoint: ["mock-sse-server"]
    command: []

  stile:
    build:
      context: .
      dockerfile: Dockerfile.example
    ports:
      - "8080:8080"
    volumes:
      - ./configs/example.yaml:/etc/stile/config.yaml:ro
      - ${WORKSPACE_PATH:-.}:/workspace  # directory the filesystem server can access
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN     # required for github MCP server
      - ADMIN_API_KEY                    # protects /admin/ endpoints
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-sse:
        condition: service_started
      jaeger:
        condition: service_started

  # Centralized health agent — polls all upstreams once and publishes results
  # to Redis. The gateway reads from Redis instead of each replica polling
  # every upstream independently.
  health-agent:
    build:
      context: .
      dockerfile: Dockerfile.example
    ports:
      - "8081:8081"
    volumes:
      - ./configs/example.yaml:/etc/stile/config.yaml:ro
      - ${WORKSPACE_PATH:-.}:/workspace
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN
    command: ["health-agent", "-config", "/etc/stile/config.yaml", "-listen", ":8081"]
    depends_on:
      redis:
        condition: service_healthy
      mock-sse:
        condition: service_started

  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver

volumes:
  pgdata:
