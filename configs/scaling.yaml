# Stile scaling config — all instances share this config.
# Stdio MCP servers are wrapped as HTTP services via `stile wrap`.

server:
  address: ":8080"
  database:
    driver: postgres
    dsn: "postgres://stile:stile@postgres:5432/stile?sslmode=disable"
  tool_cache_ttl: "5m"
  shutdown_timeout: "30s"
  auth_cache_ttl: "5m"

oauth_providers:
  mock:
    # auth_url is browser-facing (user's browser gets redirected here).
    # token_url is server-to-server (Stile calls this directly inside Docker).
    auth_url: http://localhost:9100/authorize
    token_url: http://mock-oauth:9100/token
    client_id_env: MOCK_OAUTH_CLIENT_ID       # "mock-client"
    client_secret_env: MOCK_OAUTH_CLIENT_SECRET # "mock-secret"
    scopes: ["read", "write"]

upstreams:
  - name: github
    transport: streamable-http
    url: http://github-wrapper:9090/mcp
    rate_limit: "2000/min"

  - name: fetch
    transport: streamable-http
    url: http://fetch-wrapper:9091/mcp
    rate_limit: "1000/min"

  - name: mock-oauth-tools
    transport: streamable-http
    url: http://mock-oauth-upstream:9101/mcp
    auth:
      type: oauth
      provider: mock

roles:
  agent:
    allowed_tools: ["*"]
    rate_limit: "200/min"
    tool_rate_limit: "30/sec"

rate_limits:
  backend: redis
  redis:
    address: "redis:6379"
    key_prefix: "stile:"
  default_caller: "100/min"
  default_tool: "20/sec"
  default_upstream: "1000/min"

health:
  store: redis
  redis:
    address: "redis:6379"
    key_prefix: "stile:health:"
  check_interval: "30s"

logging:
  level: "info"
  format: "json"

telemetry:
  traces:
    enabled: true
    endpoint: "jaeger:4318"
    sample_rate: 1.0

audit:
  enabled: true
  driver: postgres
  database: "postgres://stile:stile@postgres:5432/stile?sslmode=disable"

# OIDC authentication via Dex (local testing).
# Users: alice@example.com / password, bob@example.com / password
# Get a token: scripts/get-oidc-token.sh
auth:
  oidc:
    issuer: http://dex:5556/dex
    audience: stile
    validation: jwt
    caller_claim: email
    auto_provision: true
    default_roles: ["agent"]
    allowed_domains: ["example.com"]
