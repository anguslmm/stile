{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stile Admin{{if .Title}} - {{.Title}}{{end}}</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#333;font-size:14px}
a{color:#2563eb;text-decoration:none}
a:hover{text-decoration:underline}

.nav{background:#1e293b;color:#fff;padding:0 1.5rem;display:flex;align-items:center;height:48px;gap:2rem}
.nav h1{font-size:1rem;font-weight:600;letter-spacing:-.02em}
.nav a{color:#94a3b8;font-size:.875rem}
.nav a:hover,.nav a.active{color:#fff;text-decoration:none}

.container{max-width:960px;margin:1.5rem auto;padding:0 1rem}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:1.25rem;margin-bottom:1rem}
.card h2{font-size:.875rem;text-transform:uppercase;letter-spacing:.05em;color:#64748b;margin-bottom:.75rem}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}

.stat{text-align:center;padding:.75rem}
.stat .value{font-size:2rem;font-weight:700;color:#1e293b}
.stat .label{font-size:.75rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em}

.badge{display:inline-block;padding:.125rem .5rem;border-radius:9999px;font-size:.75rem;font-weight:500}
.badge-green{background:#dcfce7;color:#166534}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-yellow{background:#fef3c7;color:#92400e}
.badge-gray{background:#f1f5f9;color:#475569}

table{width:100%;border-collapse:collapse}
th{text-align:left;padding:.5rem .75rem;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:#64748b;border-bottom:2px solid #e2e8f0}
td{padding:.5rem .75rem;border-bottom:1px solid #f1f5f9}
tr:hover td{background:#f8fafc}

.btn{display:inline-block;padding:.375rem .75rem;border-radius:6px;font-size:.8125rem;font-weight:500;border:1px solid #e2e8f0;background:#fff;color:#334155;cursor:pointer}
.btn:hover{background:#f8fafc;text-decoration:none}
.btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
.btn-primary:hover{background:#1d4ed8}
.btn-danger{background:#fff;color:#dc2626;border-color:#fca5a5}
.btn-danger:hover{background:#fef2f2}
.btn-sm{padding:.25rem .5rem;font-size:.75rem}

input,select{padding:.375rem .5rem;border:1px solid #e2e8f0;border-radius:6px;font-size:.8125rem;font-family:inherit}
input:focus,select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}

.form-row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}

.empty{text-align:center;padding:2rem;color:#94a3b8}

.mono{font-family:ui-monospace,monospace;font-size:.8125rem}

.flash{padding:.75rem 1rem;border-radius:6px;margin-bottom:1rem;font-size:.875rem}
.flash-success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.flash-error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}

pre{background:#1e293b;color:#e2e8f0;padding:1rem;border-radius:8px;overflow-x:auto;font-size:.8125rem;line-height:1.5}

.pagination{display:flex;gap:.5rem;justify-content:center;margin-top:1rem}

.filter-form{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:end}
.filter-form label{font-size:.75rem;color:#64748b;display:block;margin-bottom:.125rem}
.filter-form .field{display:flex;flex-direction:column}

.detail-row{cursor:pointer}
.detail-expand{display:none;background:#f8fafc}
.detail-expand.open{display:table-row}
</style>
</head>
<body>
<nav class="nav">
  <h1>Stile</h1>
  <a href="/admin/ui/" {{if eq .Nav "dashboard"}}class="active"{{end}}>Dashboard</a>
  <a href="/admin/ui/callers" {{if eq .Nav "callers"}}class="active"{{end}}>Callers</a>
  <a href="/admin/ui/config" {{if eq .Nav "config"}}class="active"{{end}}>Config</a>
  <a href="/admin/ui/connections" {{if eq .Nav "connections"}}class="active"{{end}}>Connections</a>
  <a href="/admin/ui/audit" {{if eq .Nav "audit"}}class="active"{{end}}>Audit Log</a>
  <form method="POST" action="/admin/ui/logout" style="margin-left:auto"><button type="submit" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:.875rem;font-family:inherit">Logout</button></form>
</nav>
<div class="container">
{{template "content" .}}
</div>
</body>
</html>
{{end}}
