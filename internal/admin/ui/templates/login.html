{{define "login"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stile Admin - Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f5;color:#333;font-size:14px;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:2rem;width:100%;max-width:360px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.login-card h1{font-size:1.25rem;margin-bottom:.25rem;color:#1e293b}
.login-card p{font-size:.8125rem;color:#64748b;margin-bottom:1.5rem}
label{display:block;font-size:.8125rem;font-weight:500;color:#475569;margin-bottom:.25rem}
input[type=password]{width:100%;padding:.5rem .75rem;border:1px solid #e2e8f0;border-radius:6px;font-size:.875rem;font-family:inherit;margin-bottom:1rem}
input[type=password]:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
button{width:100%;padding:.5rem;border-radius:6px;font-size:.875rem;font-weight:500;border:none;background:#2563eb;color:#fff;cursor:pointer}
button:hover{background:#1d4ed8}
.error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;padding:.5rem .75rem;border-radius:6px;font-size:.8125rem;margin-bottom:1rem}
</style>
</head>
<body>
<div class="login-card">
  <h1>Stile Admin</h1>
  <p>Enter your admin API key to continue.</p>
  {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
  <form method="POST" action="/admin/ui/login">
    <label for="key">Admin Key</label>
    <input type="password" id="key" name="key" placeholder="Enter admin API key" required autofocus>
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
{{end}}
