# Multi-instance Stile deployment with stile wrap for stdio servers.
#
# Architecture:
#   nginx (port 8080)
#     ├── stile-1 (:8081) ──┐
#     └── stile-2 (:8082) ──┤── github-wrapper (:9090) [stile wrap]
#                            ├── fetch-wrapper  (:9091) [stile wrap]
#                            ├── dex (:5556)    [OIDC provider]
#                            ├── postgres (:5432)
#                            └── redis (:6379)
#
# Usage:
#   export GITHUB_PERSONAL_ACCESS_TOKEN="$(gh auth token)"
#   export ADMIN_API_KEY="pick-a-secret"
#   docker compose -f docker-compose.scaling.yml up --build
#
# Jaeger UI:  http://localhost:16686
# Dex:        http://localhost:5556/dex/.well-known/openid-configuration
#
# Get an OIDC token (password grant via Dex):
#   scripts/get-oidc-token.sh
#
# Or manually:
#   TOKEN=$(curl -s -X POST http://localhost:5556/dex/token \
#     -d grant_type=password \
#     -d username=alice@example.com \
#     -d password=password \
#     -d client_id=stile \
#     -d client_secret=stile-secret \
#     -d "scope=openid email profile" | jq -r .id_token)
#   curl -H "Authorization: Bearer $TOKEN" http://localhost:8080/mcp \
#     -d '{"jsonrpc":"2.0","method":"tools/list","id":1}'

services:
  # --- Load balancer ---
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./configs/nginx-scaling.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      stile-1:
        condition: service_started
      stile-2:
        condition: service_started

  # --- Stile instances (identical config, HTTP upstreams only) ---
  stile-1:
    build: .
    volumes:
      - ./configs/scaling.yaml:/etc/stile/config.yaml:ro
    environment:
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    command: ["-config", "/etc/stile/config.yaml"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dex:
        condition: service_started
      github-wrapper:
        condition: service_started
      fetch-wrapper:
        condition: service_started
      jaeger:
        condition: service_started

  stile-2:
    build: .
    volumes:
      - ./configs/scaling.yaml:/etc/stile/config.yaml:ro
    environment:
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    command: ["-config", "/etc/stile/config.yaml"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dex:
        condition: service_started
      github-wrapper:
        condition: service_started
      fetch-wrapper:
        condition: service_started
      jaeger:
        condition: service_started

  # --- Wrapped stdio MCP servers (one instance each) ---
  # These use Dockerfile.example which includes Node.js and Python runtimes
  # needed by the stdio MCP servers.
  github-wrapper:
    build:
      context: .
      dockerfile: Dockerfile.example
    command:
      - wrap
      - --command
      - "npx -y @modelcontextprotocol/server-github"
      - --port
      - "9090"
      - --otel-endpoint
      - "jaeger:4318"
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
    depends_on:
      jaeger:
        condition: service_started

  fetch-wrapper:
    build:
      context: .
      dockerfile: Dockerfile.example
    command:
      - wrap
      - --command
      - "mcp-server-fetch"
      - --port
      - "9091"
      - --otel-endpoint
      - "jaeger:4318"
    depends_on:
      jaeger:
        condition: service_started

  # --- OIDC provider (for testing) ---
  dex:
    image: dexidp/dex:latest
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./configs/dex.yaml:/etc/dex/config.yaml:ro
    ports:
      - "5556:5556"

  # --- Observability ---
  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver

  # --- Shared infrastructure ---
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: stile
      POSTGRES_USER: stile
      POSTGRES_PASSWORD: stile
    volumes:
      - scaling-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stile"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  scaling-pgdata:
